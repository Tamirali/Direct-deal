<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Deal | अक्ल की जीत</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --accent: #fdbb2d; --success: #25D366; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 50px; }
        header { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; padding: 10px; }
        .search-box { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .product-list { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .product-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .product-img { width: 100%; height: 200px; object-fit: cover; }
        .product-info { padding: 15px; }
        .price { color: var(--secondary); font-size: 20px; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .wa-btn { flex: 1; text-align: center; padding: 10px; border-radius: 5px; text-decoration: none; color: white; font-weight: bold; font-size: 14px; }
        .seller-btn { background: var(--success); }
        .admin-wa-btn { background: #128C7E; }
        .del-btn { display: none; background: #ff4444; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; margin-top: 10px; cursor: pointer; }
        
        /* Admin Form & Success Message */
        .admin-panel { display: none; background: #fff; padding: 20px; border: 2px solid var(--primary); border-radius: 10px; margin-bottom: 20px; }
        .success-overlay { display: none; text-align: center; padding: 20px; background: #e8f5e9; border-radius: 10px; border: 1px solid #4caf50; margin-bottom: 20px; }
        .exit-btn { background: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="top-bar">
    <span>Direct Deal Portal</span>
    <button onclick="loginAdmin()" style="background:var(--accent); border:none; padding:5px 15px; border-radius:15px; cursor:pointer;">🔐 Admin</button>
</div>

<header>
    <h1>Direct Deal</h1>
    <p>खरीदें और बेचें - बिना किसी दलाल के</p>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="distSearch" placeholder="अपना जिला सर्च करें..." onkeyup="filterItems()">
        <select id="catSearch" onchange="filterItems()">
            <option value="all">सभी श्रेणियाँ</option>
            <option value="Kapda">कपड़ा</option>
            <option value="Electronic">इलेक्ट्रॉनिक</option>
            <option value="Two Wheeler">टू व्हीलर</option>
            <option value="Four Wheeler">फोर व्हीलर</option>
            <option value="Home/Flat">होम/फ्लैट</option>
            <option value="Wholesale">होलसेल</option>
        </select>
    </div>

    <div id="successBox" class="success-overlay">
        <h3 style="color: #2e7d32;">✅ सफलतापूर्वक जोड़ा गया!</h3>
        <button class="exit-btn" onclick="closeAdminForm()">Exit & Back to Home</button>
    </div>

    <div id="adminForm" class="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>➕ नया सामान जोड़ें</h3>
            <button onclick="closeAdminForm()" style="background:none; border:none; color:red; font-weight:bold; cursor:pointer;">X Close</button>
        </div>
        <input type="text" id="pName" placeholder="सामान का नाम">
        <input type="number" id="pPrice" placeholder="कीमत (₹)">
        <input type="text" id="pDist" placeholder="जिला (जैसे: Siwan)">
        <select id="pCat">
            <option value="Kapda">कपड़ा</option>
            <option value="Electronic">इलेक्ट्रॉनिक</option>
            <option value="Two Wheeler">टू व्हीलर</option>
            <option value="Four Wheeler">फोर व्हीलर</option>
            <option value="Home/Flat">होम/फ्लैट</option>
            <option value="Wholesale">होलसेल</option>
        </select>
        <input type="text" id="pImg" placeholder="फोटो लिंक (URL)">
        <input type="text" id="pPhone" placeholder="सेलर का WhatsApp नंबर">
        <button onclick="saveProduct()" style="width:100%; background:var(--primary); color:white; padding:12px; border:none; border-radius:5px; margin-top:10px;">डेटाबेस में सेव करें</button>
    </div>

    <div id="loading" style="text-align:center; padding: 20px;">लोड हो रहा है...</div>
    <div id="productList" class="product-list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBC26hIZikHeDdciq9Fe1CjvlzgcS2gT4A",
        authDomain: "direct-deal-65dea.firebaseapp.com",
        projectId: "direct-deal-65dea",
        databaseURL: "https://direct-deal-65dea-default-rtdb.firebaseio.com/",
        storageBucket: "direct-deal-65dea.firebasestorage.app",
        messagingSenderId: "306889482648",
        appId: "1:306889482648:web:3c5e191374b02a2a784bed"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAdmin = false;

    function loginAdmin() {
        const pass = prompt("पासवर्ड दर्ज करें:");
        if(pass === "tamir@00769") {
            isAdmin = true;
            document.getElementById('adminForm').style.display = 'block';
            document.getElementById('successBox').style.display = 'none';
            renderProducts();
            alert("स्वागत है तामीर अली!");
        } else {
            alert("गलत पासवर्ड!");
        }
    }

    function closeAdminForm() {
        document.getElementById('adminForm').style.display = 'none';
        document.getElementById('successBox').style.display = 'none';
    }

    function saveProduct() {
        const data = {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            dist: document.getElementById('pDist').value,
            cat: document.getElementById('pCat').value,
            img: document.getElementById('pImg').value,
            phone: document.getElementById('pPhone').value
        };
        if(data.name && data.price && data.phone) {
            db.ref('products').push(data).then(() => {
                document.getElementById('adminForm').style.display = 'none';
                document.getElementById('successBox').style.display = 'block';
                // Form clear karein
                document.querySelectorAll('#adminForm input').forEach(input => input.value = '');
            });
        } else {
            alert("कृपया नाम, कीमत और नंबर भरें!");
        }
    }

    function deleteItem(id) {
        if(confirm("क्या आप इसे हटाना चाहते हैं?")) {
            db.ref('products/' + id).remove();
        }
    }

    function renderProducts() {
        db.ref('products').on('value', (snapshot) => {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            document.getElementById('loading').style.display = 'none';
            
            if(!snapshot.exists()) {
                list.innerHTML = "<p style='text-align:center;'>अभी कोई सामान नहीं है।</p>";
                return;
            }

            snapshot.forEach((child) => {
                const p = child.val();
                const id = child.key;
                list.innerHTML += `
                    <div class="product-card" data-dist="${p.dist.toLowerCase()}" data-cat="${p.cat}">
                        <img src="${p.img || 'https://via.placeholder.com/400x200?text=No+Image'}" class="product-img">
                        <div class="product-info">
                            <span style="background:#eee; padding:2px 8px; border-radius:10px; font-size:12px;">${p.cat}</span>
                            <h3 style="margin:10px 0 5px 0;">${p.name}</h3>
                            <p class="price">₹${p.price}</p>
                            <p style="color:#555;">📍 जिला: ${p.dist}</p>
                            <div class="btn-group">
                                <a href="https://wa.me/91${p.phone}" class="wa-btn seller-btn">सेलर से बात करें</a>
                                <a href="https://wa.me/918797221991" class="wa-btn admin-wa-btn">Help/Admin</a>
                            </div>
                            <button class="del-btn" style="${isAdmin ? 'display:block' : 'none'}" onclick="deleteItem('${id}')">🗑️ Delete (Admin)</button>
                        </div>
                    </div>`;
            });
        });
    }

    renderProducts();

    function filterItems() {
        const dTxt = document.getElementById('distSearch').value.toLowerCase();
        const cTxt = document.getElementById('catSearch').value;
        document.querySelectorAll('.product-card').forEach(card => {
            const dist = card.getAttribute('data-dist');
            const cat = card.getAttribute('data-cat');
            const dMatch = dist.includes(dTxt);
            const cMatch = (cTxt === 'all' || cat === cTxt);
            card.style.display = (dMatch && cMatch) ? "block" : "none";
        });
    }
</script>
</body>
</html>
