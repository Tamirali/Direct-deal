<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Deal | अक्ल की जीत</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --accent: #fdbb2d; --success: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 50px; scroll-behavior: smooth; }
        header { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; text-align: center; padding: 25px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { max-width: 800px; margin: auto; padding: 10px; }
        .search-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #ddd; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(26,42,108,0.2); }
        
        /* Product Cards Smooth Design */
        .product-list { display: grid; grid-template-columns: 1fr; gap: 20px; transition: all 0.5s ease; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 220px; object-fit: cover; background: #eee; }
        .product-info { padding: 15px; }
        .price { color: var(--secondary); font-size: 22px; font-weight: bold; margin: 5px 0; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .wa-btn { flex: 1; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 14px; transition: opacity 0.2s; }
        .wa-btn:active { opacity: 0.8; }
        .seller-btn { background: var(--success); }
        .admin-wa-btn { background: #128C7E; }
        
        /* Admin controls */
        .admin-actions { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; gap: 10px; }
        .edit-btn { background: var(--accent); color: var(--primary); border: none; padding: 10px; border-radius: 5px; cursor: pointer; flex: 1; font-weight: bold; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; flex: 1; font-weight: bold; }
        
        .admin-panel { display: none; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--primary); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--primary); color: white; position: sticky; top: 0; z-index: 100; }
    </style>
</head>
<body>

<div class="top-bar">
    <span style="font-weight: bold;">🤝 Direct Deal</span>
    <button onclick="loginAdmin()" id="loginBtn" style="background:var(--accent); border:none; padding:6px 15px; border-radius:20px; font-weight:bold; cursor:pointer;">🔐 Admin</button>
</div>

<header>
    <h1>Direct Deal</h1>
    <p>खरीदें और बेचें - बिना किसी दलाल के</p>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="distSearch" placeholder="अपना जिला सर्च करें (उदा: Siwan)..." onkeyup="filterItems()">
        <select id="catSearch" onchange="filterItems()">
            <option value="all">सभी श्रेणियाँ</option>
            <option value="Kapda">कपड़ा</option>
            <option value="Electronic">इलेक्ट्रॉनिक</option>
            <option value="Two Wheeler">टू व्हीलर</option>
            <option value="Four Wheeler">फोर व्हीलर</option>
            <option value="Home/Flat">होम/फ्लैट</option>
            <option value="Wholesale">होलसेल</option>
        </select>
    </div>

    <div id="adminForm" class="admin-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 id="formTitle">➕ नया सामान जोड़ें</h3>
            <button onclick="closeAdminForm()" style="background:none; border:none; color:red; font-weight:bold; cursor:pointer; font-size: 20px;">×</button>
        </div>
        <input type="hidden" id="editId">
        <input type="text" id="pName" placeholder="सामान का नाम">
        <input type="number" id="pPrice" placeholder="कीमत (₹)">
        <input type="text" id="pDist" placeholder="जिला (जैसे: Siwan)">
        <select id="pCat">
            <option value="Kapda">कपड़ा</option>
            <option value="Electronic">इलेक्ट्रॉनिक</option>
            <option value="Two Wheeler">टू व्हीलर</option>
            <option value="Four Wheeler">फोर व्हीलर</option>
            <option value="Home/Flat">होम/फ्लैट</option>
            <option value="Wholesale">होलसेल</option>
        </select>
        <input type="text" id="pImg" placeholder="फोटो लिंक (URL)">
        <input type="text" id="pPhone" placeholder="सेलर का WhatsApp नंबर">
        <button id="saveBtn" onclick="saveProduct()" style="width:100%; background:var(--primary); color:white; padding:14px; border:none; border-radius:8px; margin-top:10px; font-weight:bold; cursor:pointer;">डेटाबेस में सेव करें</button>
    </div>

    <div id="loading" style="text-align:center; padding: 40px; color: #666;">⌛ सामान लोड हो रहा है...</div>
    <div id="productList" class="product-list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBC26hIZikHeDdciq9Fe1CjvlzgcS2gT4A",
        authDomain: "direct-deal-65dea.firebaseapp.com",
        projectId: "direct-deal-65dea",
        databaseURL: "https://direct-deal-65dea-default-rtdb.firebaseio.com/",
        storageBucket: "direct-deal-65dea.firebasestorage.app",
        messagingSenderId: "306889482648",
        appId: "1:306889482648:web:3c5e191374b02a2a784bed"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAdmin = false;

    function loginAdmin() {
        const pass = prompt("पासवर्ड दर्ज करें:");
        if(pass === "tamir@00769") {
            isAdmin = true;
            document.getElementById('adminForm').style.display = 'block';
            document.getElementById('loginBtn').innerHTML = "🔓 Logged In";
            renderProducts();
            window.scrollTo(0,0);
        } else { alert("गलत पासवर्ड!"); }
    }

    function closeAdminForm() {
        document.getElementById('adminForm').style.display = 'none';
        resetForm();
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('formTitle').innerHTML = "➕ नया सामान जोड़ें";
        document.getElementById('saveBtn').innerHTML = "डेटाबेस में सेव करें";
        document.querySelectorAll('#adminForm input').forEach(i => i.value = '');
    }

    function saveProduct() {
        const id = document.getElementById('editId').value;
        const data = {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            dist: document.getElementById('pDist').value,
            cat: document.getElementById('pCat').value,
            img: document.getElementById('pImg').value,
            phone: document.getElementById('pPhone').value
        };

        if(data.name && data.price && data.phone) {
            if(id) {
                // Edit existing product
                db.ref('products/' + id).update(data).then(() => {
                    alert("सुधार सफल रहा!");
                    closeAdminForm();
                });
            } else {
                // Add new product
                db.ref('products').push(data).then(() => {
                    alert("सफलतापूर्वक जोड़ा गया!");
                    closeAdminForm();
                });
            }
        } else { alert("कृपया ज़रूरी जानकारी भरें!"); }
    }

    function editItem(id, name, price, dist, cat, img, phone) {
        document.getElementById('adminForm').style.display = 'block';
        document.getElementById('editId').value = id;
        document.getElementById('pName').value = name;
        document.getElementById('pPrice').value = price;
        document.getElementById('pDist').value = dist;
        document.getElementById('pCat').value = cat;
        document.getElementById('pImg').value = img;
        document.getElementById('pPhone').value = phone;
        document.getElementById('formTitle').innerHTML = "📝 सामान में सुधार करें";
        document.getElementById('saveBtn').innerHTML = "बदलाव सुरक्षित करें";
        window.scrollTo(0,0);
    }

    function deleteItem(id) {
        if(confirm("क्या आप इसे हटाना चाहते हैं?")) { db.ref('products/' + id).remove(); }
    }

    function renderProducts() {
        db.ref('products').on('value', (snapshot) => {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            document.getElementById('loading').style.display = 'none';
            
            if(!snapshot.exists()) {
                list.innerHTML = "<p style='text-align:center;'>अभी कोई सामान उपलब्ध नहीं है।</p>";
                return;
            }

            snapshot.forEach((child) => {
                const p = child.val();
                const id = child.key;
                list.innerHTML += `
                    <div class="product-card" data-dist="${p.dist.toLowerCase()}" data-cat="${p.cat}">
                        <img src="${p.img || 'https://via.placeholder.com/400x220?text=Direct+Deal'}" class="product-img">
                        <div class="product-info">
                            <span style="background:var(--primary); color:white; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:bold;">${p.cat}</span>
                            <h3 style="margin:10px 0 5px 0; color:var(--primary);">${p.name}</h3>
                            <p class="price">₹${p.price}</p>
                            <p style="color:#555; font-size:14px;">📍 जिला: <b>${p.dist}</b></p>
                            <div class="btn-group">
                                <a href="https://wa.me/91${p.phone}" class="wa-btn seller-btn">💬 Seller</a>
                                <a href="https://wa.me/918797221991" class="wa-btn admin-wa-btn">📞 Help</a>
                            </div>
                            <div class="admin-actions" style="${isAdmin ? 'display:flex' : 'none'}">
                                <button class="edit-btn" onclick="editItem('${id}','${p.name}','${p.price}','${p.dist}','${p.cat}','${p.img}','${p.phone}')">📝 Edit</button>
                                <button class="del-btn" onclick="deleteItem('${id}')">🗑️ Delete</button>
                            </div>
                        </div>
                    </div>`;
            });
        });
    }

    renderProducts();

    function filterItems() {
        const dTxt = document.getElementById('distSearch').value.toLowerCase();
        const cTxt = document.getElementById('catSearch').value;
        document.querySelectorAll('.product-card').forEach(card => {
            const dist = card.getAttribute('data-dist');
            const cat = card.getAttribute('data-cat');
            card.style.display = (dist.includes(dTxt) && (cTxt === 'all' || cat === cTxt)) ? "block" : "none";
        });
    }
</script>
</body>
</html>
